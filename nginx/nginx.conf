# Load balancer for the chat cluster.
#
# ip_hash gives sticky sessions: Socket.IO's HTTP long-polling fallback
# sends multiple requests per session, which must all reach the same
# instance. Pure-WebSocket clients don't strictly need it, but stickiness
# makes both transports correct.
upstream chat_cluster {
    ip_hash;
    server chat1:3000;
    server chat2:3000;
    server chat3:3000;
}

server {
    listen 80;

    location / {
        proxy_pass http://chat_cluster;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # long-lived connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
