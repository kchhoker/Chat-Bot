# Full horizontal-scaling demo: 3 chat server instances behind nginx,
# kept in sync through Redis pub/sub.
#
#   docker compose up --build
#   open http://localhost:8080
#
# Open two browser tabs — the badge on each message shows which instance
# handled it. Messages flow between instances via Redis.

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  chat1: &chat
    build: .
    environment:
      REDIS_URL: redis://redis:6379
      INSTANCE_NAME: chat-1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      BOT_MODEL: ${BOT_MODEL:-claude-opus-4-8}
    depends_on:
      redis:
        condition: service_healthy

  chat2:
    <<: *chat
    environment:
      REDIS_URL: redis://redis:6379
      INSTANCE_NAME: chat-2
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      BOT_MODEL: ${BOT_MODEL:-claude-opus-4-8}

  chat3:
    <<: *chat
    environment:
      REDIS_URL: redis://redis:6379
      INSTANCE_NAME: chat-3
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      BOT_MODEL: ${BOT_MODEL:-claude-opus-4-8}

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - chat1
      - chat2
      - chat3
